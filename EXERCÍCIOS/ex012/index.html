    <title>Vídeos em HTML5</title>
</head>
<body>
    <h1>inserindo vídeos hospedados localmente:</h1>
      <p>Este vídeo está hospedado no meu próprio servidor</p>
       <video controls width="560" poster="midia/capa-bella.png" muted autoplay loop> 
         <source src="midia/my-video.webm" type="video/webm">
         <source src="midia/my-video.ogv" type="video/ogv">
         <source src="midia/my-video.mp4" type="video/mp4">
         <source src="midia/my-video.mov" type="video/mov">
         <source src="midia/my-video.mkv" type="video/mkv">
         <p>Seu navegador não tem compatibilidade para reproduzir esse vídeo.</p> <!--Em caso de não compatibilidade será exibido essa mensagem-->
        
    </video>
      <p>ela é muito fofa hahaha!!!</p>
